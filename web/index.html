<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Nexus Nook — an unofficial, fan-made Star Citizen companion. Track your fleet, inventory, trade routes, and server status in one cozy nook."
    />
    <title>Nexus Nook — Star Citizen Companion</title>

    <!-- Brand icon / favicon (vector mark). -->
    <!-- NOTE: PNG raster icons (192x192, 512x512, 180x180 apple-touch-icon) were not
         generated because no SVG->PNG tool (rsvg-convert/inkscape/ImageMagick) is
         available in this environment. The SVG works as a favicon and PWA icon in
         modern browsers; raster PNGs can be generated later from public/icon.svg. -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="mask-icon" href="./icon.svg" color="#7c3aed" />

    <!-- Installable (PWA-lite, "Add to Home Screen"). -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0b1120" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nexus Nook" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Social preview. -->
    <meta property="og:title" content="Nexus Nook — Star Citizen Companion" />
    <meta
      property="og:description"
      content="A cozy nook in the wide expanse of the Nexus. Track your fleet, inventory, trade routes, and server status."
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
