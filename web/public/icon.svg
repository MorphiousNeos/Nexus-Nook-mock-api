<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Nexus Nook">
  <defs>
    <linearGradient id="nnBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="nnGlow" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="0.6" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded backdrop -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0b1120"/>
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#1e293b" stroke-width="4"/>

  <!-- Portal glow -->
  <circle cx="256" cy="248" r="170" fill="url(#nnGlow)"/>

  <!-- Outer hexagon "nook" portal -->
  <path
    d="M256 92 L398 174 L398 338 L256 420 L114 338 L114 174 Z"
    fill="none"
    stroke="url(#nnBrand)"
    stroke-width="18"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon -->
  <path
    d="M256 156 L342 206 L342 306 L256 356 L170 306 L170 206 Z"
    fill="#0b1120"
    stroke="url(#nnBrand)"
    stroke-width="10"
    stroke-linejoin="round"
    opacity="0.85"
  />

  <!-- Central star spark -->
  <path
    d="M256 196 L268 244 L316 256 L268 268 L256 316 L244 268 L196 256 L244 244 Z"
    fill="url(#nnBrand)"
  />
  <circle cx="256" cy="256" r="10" fill="#ffffff"/>
</svg>
